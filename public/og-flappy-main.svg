<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1633"/>
      <stop offset="55%" stop-color="#1a2f63"/>
      <stop offset="100%" stop-color="#2d0f1f"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffbe5c"/>
      <stop offset="100%" stop-color="#ff6b3d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="140" r="220" fill="#5ab7ff" opacity="0.12"/>
  <circle cx="180" cy="530" r="180" fill="#ff9a6b" opacity="0.10"/>

  <g filter="url(#shadow)">
    <rect x="80" y="70" rx="28" ry="28" width="1040" height="490" fill="#0d1228" opacity="0.62" stroke="#ffffff" stroke-opacity="0.16"/>
  </g>

  <image href="https://flappy-claw.vercel.app/Jimmy_NewUserClaw.png" x="110" y="200" width="220" height="220"/>

  <text x="370" y="205" fill="#ffd98b" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="42">🦞 FLAPPY CLAW</text>
  <text x="370" y="265" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="78">Survive the Updates</text>
  <text x="370" y="330" fill="#d7e2ff" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="36">Tap to start. Beat your friends. Share your score.</text>

  <g transform="translate(370,390)">
    <rect width="280" height="72" rx="36" fill="url(#card)"/>
    <text x="140" y="47" text-anchor="middle" fill="#24130d" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="34">TODAY'S TARGET</text>
  </g>

  <g transform="translate(670,390)">
    <rect width="230" height="72" rx="36" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.35"/>
    <text x="115" y="47" text-anchor="middle" fill="#f4f8ff" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="33">CAN YOU BEAT IT?</text>
  </g>

  <text x="90" y="595" fill="#9ec0ff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">flappy-claw.vercel.app</text>
</svg>